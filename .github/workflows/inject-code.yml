name: Inject Source Code & Deploy Docs

on:
  # Fired remotely by the Flutter repo's notify-docs.yml via repository_dispatch
  repository_dispatch:
    types: [flutter-code-updated]
  # Lets you click "Run workflow" manually from the Actions tab
  workflow_dispatch:
  # Optional: also run on every push to this docs repo
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DOCS repo
        uses: actions/checkout@v4
        with:
          path: docs-repo

      - name: Checkout FLUTTER repo (private)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.FLUTTER_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: flutter-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run injector
        run: python3 docs-repo/scripts/inject_code.py
        env:
          DOCS_HTML_PATH: docs-repo/index.html
          FLUTTER_SRC_PATH: flutter-src

      - name: Commit updated index.html
        run: |
          cd docs-repo
          git config user.name "bga-pipeline-bot"
          git config user.email "actions@github.com"
          if git diff --quiet index.html; then
            echo "No code changes detected — skipping commit."
          else
            git add index.html
            git commit -m "chore: auto-inject latest Flutter source code [skip ci]"
            git push
          fi

      - name: Deploy to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-repo
          publish_branch: gh-pages
