name: Inject Source Code & Deploy Docs

on:
  repository_dispatch:
    types: [flutter-code-updated]
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DOCS repo
        uses: actions/checkout@v4
        with:
          path: docs-repo

      - name: Checkout FLUTTER repo
        uses: actions/checkout@v4
        with:
          repository: dhruv99968/bga_app_copy
          token: ${{ secrets.PIPELINE_TOKEN }}
          path: flutter-src

      - name: Verify Flutter Source
        run: |
          echo "Checking Flutter repo contents..."
          ls -la flutter-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run injector
        run: python3 docs-repo/scripts/inject_code.py
        env:
          DOCS_HTML_PATH: docs-repo/index.html
          FLUTTER_SRC_PATH: flutter-src

      - name: Commit updated files
        run: |
          cd docs-repo
          git config user.name "bga-pipeline-bot"
          git config user.email "actions@github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No code changes detected — skipping commit."
          else
            git commit -m "chore: auto-inject latest Flutter source code [skip ci]"
            git push
          fi

      - name: Deploy to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-repo
          publish_branch: gh-pages
