name: Inject Source Code & Deploy Docs

on:
  repository_dispatch:
    types: [flutter-code-updated]
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  inject:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DOCS repo
        uses: actions/checkout@v4
        with:
          path: docs-repo

      - name: Checkout FLUTTER repo
        uses: actions/checkout@v4
        with:
          repository: dhruv99968/bga_app_copy
          token: ${{ secrets.PIPELINE_TOKEN }}
          ref: main
          path: flutter-src

      - name: Verify Flutter Source
        run: |
          echo "Flutter repo HEAD commit:"
          git -C flutter-src log --oneline -1
          echo "signup_screen.dart first line:"
          head -1 flutter-src/lib/views/auth/signup_screen.dart

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run injector
        working-directory: docs-repo
        run: python3 scripts/inject_code.py
        env:
          DOCS_HTML_PATH: index.html
          FLUTTER_SRC_PATH: ${{ github.workspace }}/flutter-src

      - name: Deploy to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-repo
          publish_branch: gh-pages
          force_orphan: true
